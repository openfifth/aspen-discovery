networks:
  net-aspen:
  kohadev_kohanet:
    external: true
volumes:
  solr:

services:
  backend:
    image: ${BACKEND_IMAGE_TAG:-aspendiscovery/aspen}
    env_file:
      - .env
    networks:
      - net-aspen
    tty: true
    volumes:
      - ${ASPEN_DATA_DIR}/conf:/usr/local/aspen-discovery/sites/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/data:/data/aspen-discovery/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/logs:/var/log/aspen-discovery/${SITE_NAME}
    depends_on:
      - db

  apache:
    image: ${BACKEND_IMAGE_TAG:-aspendiscovery/aspen}
    env_file:
      - .env
    ports:
      - "85:80"
    networks:
      - net-aspen
    volumes:
      - ${ASPEN_DATA_DIR}/conf:/usr/local/aspen-discovery/sites/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/data:/data/aspen-discovery/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/logs:/var/log/aspen-discovery/${SITE_NAME}
    command:
      - apache
    depends_on:
      - backend
    tty: true

  cron:
    image: ${BACKEND_IMAGE_TAG:-aspendiscovery/aspen}
    env_file:
      - .env
    networks:
      net-aspen:
        aliases:
          - ${SITE_NAME}
    tty: true
    volumes:
      - ${ASPEN_DATA_DIR}/conf:/usr/local/aspen-discovery/sites/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/data:/data/aspen-discovery/${SITE_NAME}
      - ${ASPEN_DATA_DIR}/logs:/var/log/aspen-discovery/${SITE_NAME}
    command:
      - cron
    depends_on:
      - backend
      - apache


  db:
    image: ${MARIADB_IMAGE:-mariadb:10.5}
    restart: always
    env_file:
      - .env
    environment:
      - MARIADB_ROOT_PASSWORD=${DATABASE_ROOT_PASSWORD:-password}
      - MARIADB_USER=${DATABASE_USER:-user123}
      - MARIADB_PASSWORD=${DATABASE_PASSWORD:-passwd}
      - MARIADB_DATABASE=${DATABASE_NAME:-aspen}
    volumes:
      - ${ASPEN_DATA_DIR}/database:/var/lib/mysql
      - ${ASPEN_DATA_DIR}/my.cnf:/etc/mysql/my.cnf
    networks:
      - net-aspen

  solr:
    image: ${SOLR_IMAGE_TAG:-aspendiscovery/solr}
    env_file:
      - .env
    environment:
      - SOLR_PORT=${SOLR_PORT:-8983}
    ports:
      - "${SOLR_PORT}:${SOLR_PORT:-8983}"
    volumes:
      - solr:/var/solr
      - solr:/opt/solr/server/solr
    networks:
      - net-aspen
    depends_on:
      - backend
